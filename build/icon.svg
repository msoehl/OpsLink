<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a0e1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1f2937" stroke-width="1" opacity="0.5">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Tablet device -->
  <rect x="100" y="72" width="312" height="380" rx="28" fill="#111827" stroke="#1f2937" stroke-width="2"/>
  <rect x="114" y="88" width="284" height="340" rx="16" fill="#0d1117"/>

  <!-- Screen glow -->
  <rect x="114" y="88" width="284" height="180" rx="16" fill="url(#glow)"/>

  <!-- Route line on screen -->
  <circle cx="172" cy="220" r="8" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
  <circle cx="340" cy="220" r="8" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
  <path d="M 180 220 Q 256 170 332 220" stroke="#3b82f6" stroke-width="2" fill="none" stroke-dasharray="6,4" opacity="0.8"/>

  <!-- Airplane icon centered -->
  <g transform="translate(256, 220) rotate(-35) scale(1.15)">
    <path d="M0,-22 C3,-22 8,-14 8,-6 L22,2 L22,8 L8,4 L6,18 L12,22 L12,26 L0,23 L-12,26 L-12,22 L-6,18 L-8,4 L-22,8 L-22,2 L-8,-6 C-8,-14 -3,-22 0,-22 Z"
          fill="url(#accent)"/>
  </g>

  <!-- Bottom bar lines (like a real EFB) -->
  <rect x="134" y="360" width="100" height="5" rx="2.5" fill="#1f2937"/>
  <rect x="134" y="374" width="70" height="5" rx="2.5" fill="#1f2937"/>
  <rect x="260" y="360" width="120" height="14" rx="4" fill="#1e3a5f"/>

  <!-- Home indicator -->
  <rect x="216" y="430" width="80" height="5" rx="2.5" fill="#374151"/>

  <!-- Blue accent border glow -->
  <rect x="100" y="72" width="312" height="380" rx="28" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
</svg>
