name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build & publish (macOS)
        run: npm run electron:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build & publish (Windows)
        run: npm run electron:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-release-notes:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Update release notes
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Download OpsLink ${{ github.ref_name }}

            | Platform | Datei |
            |----------|-------|
            | 🍎 macOS | **[OpsLink.dmg](https://github.com/msoehl/OpsLink/releases/download/${{ github.ref_name }}/OpsLink.dmg)** |
            | 🪟 Windows | **[OpsLink-Setup.exe](https://github.com/msoehl/OpsLink/releases/download/${{ github.ref_name }}/OpsLink-Setup.exe)** |

            > **macOS:** Nicht signiert — beim ersten Start Rechtsklick → **Öffnen**.

            > Die übrigen Dateien (`*.yml`, `*.blockmap`, `*.zip`) werden vom Auto-Updater benötigt und müssen nicht manuell heruntergeladen werden.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
