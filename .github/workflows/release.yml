name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build & publish (macOS)
        run: npm run electron:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build & publish (Windows)
        run: npm run electron:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-release-notes:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Update release notes
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Download OpenEFB ${{ github.ref_name }}

            | Platform | File | Description |
            |----------|------|-------------|
            | 🍎 macOS (Apple Silicon) | `OpenEFB-arm64.dmg` | Für M1/M2/M3/M4 Macs |
            | 🍎 macOS (Intel) | `OpenEFB-x64.dmg` | Für Intel Macs |
            | 🪟 Windows | `OpenEFB-Setup.exe` | Windows Installer |

            > **macOS Hinweis:** Die App ist nicht signiert. Beim ersten Start: Rechtsklick → **Öffnen**.

            ---

            <details>
            <summary>ℹ️ Weitere Dateien (nur für Auto-Updater — nicht manuell herunterladen)</summary>

            Die übrigen Dateien (`*.yml`, `*.blockmap`, `*.zip`) werden intern vom Auto-Updater verwendet,
            um stille Hintergrund-Updates zu liefern. Diese müssen **nicht** manuell heruntergeladen werden.

            </details>
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
