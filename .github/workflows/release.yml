name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
    steps:
      - name: Create GitHub Release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          body: |
            ## Download OpenEFB ${{ github.ref_name }}

            | Platform | File | Description |
            |----------|------|-------------|
            | 🍎 macOS | `OpenEFB.dmg` | Installer disk image |
            | 🪟 Windows | `OpenEFB-Setup.exe` | Installer |

            > **macOS note:** The app is currently unsigned. On first launch, right-click → **Open**.

            ---

            <details>
            <summary>ℹ️ Other files (auto-updater only — you don't need these)</summary>

            The remaining files (`*.yml`, `*.blockmap`, `*.zip`) are used internally by the auto-updater
            to deliver silent background updates. You do **not** need to download them manually.

            </details>
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build & publish (macOS)
        run: npm run electron:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build & publish (Windows)
        run: npm run electron:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
